<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quranify - قرآن كريم </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="mp4/268-removebg-preview.png">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="#">
                <img src="mp4/boodifyLogo.jpg" alt="Boodify Logo">
                <h1>Quranify <sub class="version">V1.2</sub></h1>
            </a>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="What do you want to listen to?">
            </div>
            <div id="search-results" class="search-results-container"></div>
        </div>
        <div class="header-right">
            
            <div class="user-profile">
                <button class="user-btn"> A </button>
            </div>
        </div>
    </header>
    <div class="container">
        <div id="right-pane" class="pane">
            <h2 class="greeting">Good evening (It will work soon)</h2>
            <div class="colorful-grid">
                <div class="color-box" id="box1">
                    <img src="mp4/LikedSongsLogo.jpg" alt="Playlist Art">
                    <spanSoon</span>
                </div>
                <div class="color-box" id="box2">
                    <img src="https://storage.googleapis.com/gemini-codelab/album-art-3.png" alt="Playlist Art">
                    <span>Soon</span>
                </div>
                <div class="color-box" id="box3">
                    <img src="https://storage.googleapis.com/gemini-codelab/album-art-2.png" alt="Playlist Art">
                    <span>Soon</span>
                </div>
                <div class="color-box" id="box4">
                    <img src="https://storage.googleapis.com/gemini-codelab/album-art-1.png" alt="Playlist Art">
                    <span>Soon</span>
                </div>
            </div>

            <h2 class="section-title">For You</h2>
            <div class="playlists-grid"></div>

        </div>
    </div>

    <div id="song-queue-sidebar" class="song-queue-sidebar">
        <div class="queue-header">
            <h2>Play Queue</h2>
        </div>
        <div id="now-playing-section">
            <h3>Now Playing</h3>
            <div id="now-playing-card" class="queue-item"></div>
        </div>
        <div id="next-up-section">
            <h3>Next Up</h3>
            <div id="queue-list"></div>
        </div>
    </div>


    <div id="music-player" class="music-player">
        <div class="song-info">
            <img src="https://storage.googleapis.com/gemini-codelab/album-art-1.png" alt="Album Art" id="player-album-art">
            <div class="song-details">
                <span id="player-song-title">Song Title</span>
                <span id="player-song-artist">Artist Name</span>
            </div>
        </div>
        <div class="player-controls">
            <div class="control-buttons">
                <button id="shuffle-btn" class="control-button"><i class="fas fa-random"></i></button>
                <button id="prev-btn" class="control-button"><i class="fas fa-step-backward"></i></button>
                <button id="player-play-btn" class="control-button large"><i class="fas fa-play-circle"></i></button>
                <button id="next-btn" class="control-button"><i class="fas fa-step-forward"></i></button>
                <button id="replay-btn" class="control-button"></button>
            </div>
             
                        <div class="progress-container" id="progress-container">
                                            <span id="current-time">0:00</span>
                                                            <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                                                                            <span id="duration">0:00</span>
                                                                                        </div>
            
        </div>
        <div class="volume-controls">
            <button id="queue-btn" class="queue-btn"><i class="fas fa-bars"></i></button>
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <script src="main.js"></script>
</body>

                                                       </html>
